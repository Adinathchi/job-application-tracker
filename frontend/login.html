<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boarding — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-body">

  <!-- animated radar / flight-path backdrop, purely decorative -->
  <div class="radar-bg" aria-hidden="true">
    <div class="radar-ring r1"></div>
    <div class="radar-ring r2"></div>
    <div class="radar-ring r3"></div>
    <div class="radar-sweep"></div>
    <span class="blip b1"></span>
    <span class="blip b2"></span>
    <span class="blip b3"></span>
  </div>

  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-brand">
        <span class="eyebrow">GATE · CAREER</span>
        <h1>Boarding<span class="cursor-dot">.</span></h1>
        <p class="subtitle">Sign in to track where every application is headed.</p>
      </div>

      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" id="tabLogin" role="tab" aria-selected="true">Log in</button>
        <button class="auth-tab" id="tabSignup" role="tab" aria-selected="false">Create account</button>
      </div>

      <p class="auth-error" id="authError"></p>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="auth-form">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn--primary btn--block" id="loginSubmit">Log in</button>
      </form>

      <!-- SIGNUP FORM -->
      <form id="signupForm" class="auth-form" style="display:none;">
        <div class="field">
          <label for="signupName">Full name</label>
          <input type="text" id="signupName" required placeholder="e.g. Priya Sharma" autocomplete="name" />
        </div>
        <div class="field">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" required placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" required minlength="6" placeholder="At least 6 characters" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn--primary btn--block" id="signupSubmit">Create account</button>
      </form>

      <p class="auth-footnote">Runs entirely on your own local backend — nothing is sent anywhere else.</p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
